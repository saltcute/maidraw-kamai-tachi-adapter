name: Publish to npm

on:
    push:
        tags:
            - v*

permissions:
    id-token: write  # Required for OIDC
    contents: read

jobs:
    publish:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                node-version: 24
                registry-url: 'https://registry.npmjs.org'
                package-manager-cache: false

            - name: Install dependencies
              run: npm ci

            - name: Build
              run: npm run build

            - name: Publish
              run: npm publish
